name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cdm:
    name: cdm — fmt · clippy · test · doctest · semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags needed for the semver baseline

      - name: Install Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Phase 1 CI gate (TODO.md): the disciplines that fail the build when violated.
      - name: Format check
        run: cargo fmt --all --check

      # --locked enforces the committed Cargo.lock, so CI fails if resolution drifts
      # (the reason .gitignore tracks the lockfile: pinned, reproducible builds).
      - name: Clippy (deny warnings — also promotes missing_docs to an error)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features

      - name: Doctests
        run: cargo test --locked --doc --all-features

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: SemVer check (cdm)
        run: |
          # Baseline must be a septicomics-cdm-scoped tag (convention:
          # `septicomics-cdm-v<semver>`); a workspace-global `git describe` would
          # pick another crate's tag and check the wrong baseline.
          BASE="$(git tag --list 'septicomics-cdm-v*' --sort=-version:refname | head -n1)"
          if [ -n "$BASE" ]; then
            echo "Comparing septicomics-cdm against baseline tag: $BASE"
            cargo semver-checks check-release --package septicomics-cdm --baseline-rev "$BASE"
          else
            echo "::notice::No septicomics-cdm release tag yet — semver baseline check is wired but skipped until the first tag (see docs/cdm-versioning.md)."
          fi

  fed-protocol:
    name: fed-protocol — fmt · clippy · test · property-tests · semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags needed for the semver baseline

      - name: Install Rust (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Phase 2 CI gate: version negotiation + no-record-encoding property test + semver
      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -p septicomics-fedproto -- -D warnings

      - name: Test
        run: cargo test --locked --all-features -p septicomics-fedproto

      - name: Property tests (no-record-encoding invariant)
        run: cargo test --locked --test '*' -p septicomics-fedproto --lib property_tests -- --nocapture

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: SemVer check (fed-protocol)
        run: |
          BASE="$(git tag --list 'septicomics-fedproto-v*' --sort=-version:refname | head -n1)"
          if [ -n "$BASE" ]; then
            echo "Comparing septicomics-fedproto against baseline tag: $BASE"
            cargo semver-checks check-release --package septicomics-fedproto --baseline-rev "$BASE"
          else
            echo "::notice::No septicomics-fedproto release tag yet — semver baseline check is wired but skipped until the first tag."
          fi
